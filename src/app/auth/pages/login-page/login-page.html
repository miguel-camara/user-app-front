<form class="flex flex-col gap-2 rounded-lg" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
  <label class="input input-bordered flex items-center gap-2 rounded-lg">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
      <path
        fill="currentColor"
        d="M12 21q-1.868 0-3.51-.708t-2.857-1.924t-1.924-2.856T3 12.003t.709-3.51Q4.417 6.85 5.63 5.634t2.857-1.925T11.997 3t3.51.709t2.859 1.924t1.925 2.857T21 12v.989q0 1.263-.868 2.137T18 16q-.894 0-1.63-.49q-.737-.49-1.09-1.306q-.57.821-1.425 1.308T12 16q-1.671 0-2.835-1.164Q8 13.67 8 12t1.165-2.835T12 8t2.836 1.165T16 12v.989q0 .822.589 1.417T18 15t1.412-.594t.588-1.418V12q0-3.35-2.325-5.675T12 4T6.325 6.325T4 12t2.325 5.675T12 20h4.5q.213 0 .356.144t.144.357t-.144.356T16.5 21zm2.125-6.875Q15 13.25 15 12t-.875-2.125T12 9t-2.125.875T9 12t.875 2.125T12 15t2.125-.875"
      />
    </svg>
    <input type="text" class="grow" placeholder="Correo electrónico" formControlName="email" />
  </label>

  <label class="input input-bordered flex items-center gap-2 rounded-lg">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
      <path
        fill="currentColor"
        d="M5.039 19q-.441 0-.74-.299T4 17.961v-.607q0-.62.36-1.159q.361-.54.97-.837q1.416-.68 2.834-1.018Q9.58 14 11 14q.446 0 .883.041q.436.042.883.111q.217.044.34.174t.144.347q.108.944.566 1.799t1.197 1.464q.04.03.064.073q.023.043.023.095v.127q0 .31-.23.54t-.54.229zM11 11.77q-1.246 0-2.123-.878Q8 10.016 8 8.77t.877-2.123T11 5.77t2.123.877T14 8.77t-.877 2.123T11 11.77m7.847 2.434q.23-.24.23-.55q0-.309-.23-.538t-.54-.23t-.548.23t-.24.539t.24.549t.549.24t.539-.24m-.447 6.909l-.75-.77q-.03-.03-.13-.273v-3.43q-.85-.248-1.387-.96q-.537-.71-.537-1.621q0-1.123.794-1.917q.794-.795 1.918-.795t1.907.794t.785 1.918q0 .875-.484 1.538q-.483.663-1.247.962l.67.669q.13.13.13.292t-.13.293l-.589.588q-.13.13-.13.283t.13.283l.608.588q.13.13.13.283t-.13.282l-.992.993q-.131.13-.283.13t-.283-.13"
      />
    </svg>
    <input type="password" class="grow" placeholder="Contraseña" formControlName="password" />
  </label>

  <button type="submit" class="btn btn-secondary rounded-lg">Login</button>

  <p class="text-slate-700">
    ¿No tienes cuenta?
    <a routerLink="/auth/register" class="text-secondary">Crea una aquí</a>
  </p>
</form>

<!-- @if (false) { -->
@if (hasError()) {
  <div role="alert" class="alert alert-error animate-fadeIn fixed bottom-5 right-5 w-52">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="h-6 w-6 shrink-0 stroke-current"
      fill="none"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"
      />
    </svg>
    <span>Por favor revise la información ingresada.</span>
  </div>
}
