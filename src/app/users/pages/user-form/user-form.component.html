@if (userResource.hasValue()) {
  <div class="p-5">
    <app-user-form-detail [user]="userResource.value()" />
  </div>
} @else if (userResource.error()) {
  <div class="flex justify-center items-center h-96">
    <div class="flex flex-col justify-center items-center gap-3 h-96">
      @if (userResource.error()?.message === 'null') {
        <svg xmlns="http://www.w3.org/2000/svg" width="5.5em" height="5.5em" viewBox="0 0 24 24">
          <path d="M0 0h24v24H0z" fill="none" />
          <path
            fill="currentColor"
            d="M10 12c2.21 0 4-1.79 4-4s-1.79-4-4-4s-4 1.79-4 4s1.79 4 4 4m0-6a2 2 0 1 1 0 4c-1.11 0-2-.89-2-2s.9-2 2-2m2 14H2v-3c0-2.67 5.33-4 8-4c1 0 2.38.19 3.71.56c-.3.56-.48 1.18-.5 1.83c-.98-.29-2.1-.49-3.21-.49c-2.97 0-6.1 1.46-6.1 2.1v1.1H12zm8.8-3v-1.5c0-1.4-1.4-2.5-2.8-2.5s-2.8 1.1-2.8 2.5V17c-.6 0-1.2.6-1.2 1.2v3.5c0 .7.6 1.3 1.2 1.3h5.5c.7 0 1.3-.6 1.3-1.2v-3.5c0-.7-.6-1.3-1.2-1.3m-1.3 0h-3v-1.5c0-.8.7-1.3 1.5-1.3s1.5.5 1.5 1.3z"
          />
        </svg>

        @if (authService.user()?.isAuth) {
          <p class="text-xl text-center font-bold">No tiene permisos para este recurso</p>

          <button class="btn btn-soft btn-primary" routerLink="/users">Inicio</button>
        } @else {
          <p class="text-xl text-center font-bold">No tienes permisos</p>
          <button class="btn btn-soft btn-primary" routerLink="/users">Iniciar Sesión</button>
        }
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="5.5em" height="5.5em" viewBox="0 0 24 24">
          <path d="M0 0h24v24H0z" fill="none" />
          <path
            fill="currentColor"
            d="m2.75 7l1.28-1.25L13.26 15L20 21.72L18.73 23l-3-3H4v-3c0-1.86 2.61-3.08 5.09-3.64zM20 17v2.18l-1.9-1.9V17c0-.26-.5-.65-1.3-1L14 13.18c2.71.45 6 1.73 6 3.82M5.9 17v1.1h7.93L10.72 15c-2.53.3-4.82 1.45-4.82 2M12 4a4 4 0 0 1 4 4c0 1.95-1.4 3.58-3.25 3.93L8.07 7.25A4.004 4.004 0 0 1 12 4m0 2a2 2 0 0 0-2 2a2 2 0 0 0 2 2a2 2 0 0 0 2-2a2 2 0 0 0-2-2"
          />
        </svg>

        <p class="text-xl text-center font-bold">{{ userResource.error()?.message }}</p>

        <button class="btn btn-soft btn-primary" routerLink="/users">Inicio</button>
      }
    </div>
  </div>
} @else {
  <app-loading />
}
