@if (userResource.hasValue()) {
  <div class="p-5">
    <app-user-form-detail [user]="userResource.value()" />
  </div>
} @else if (userResource.error()) {
  <div class="flex justify-center items-center h-full">
    <p class="text-2xl font-bold text-center text-error">
      {{ userResource.error()?.message }}
    </p>
  </div>
} @else {
  <app-loading />
}
